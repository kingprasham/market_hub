name: market_hub_new
description: "Real-time commodity market tracking application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management - GetX
  get: ^4.6.6

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # WebSocket for real-time data
  web_socket_channel: ^3.0.1

  # Connectivity monitoring
  connectivity_plus: ^6.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage for PIN
  flutter_secure_storage: ^9.2.2

  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0

  # PIN/OTP Input
  pinput: ^5.0.0

  # Image Handling
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^27.1.52

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  permission_handler: ^11.3.1

  # WebView
  webview_flutter: ^4.10.0

  # Device Info for single device login
  device_info_plus: ^10.1.2

  # UUID generation
  uuid: ^4.5.1

  # JSON
  json_annotation: ^4.9.0

  # RxDart for stream operations
  rxdart: ^0.28.0

  # XML parsing for RSS feeds
  xml: ^6.5.0

  # Charts
  fl_chart: ^0.69.2

  # Country code picker
  country_code_picker: ^3.0.0

  # Cupertino icons
  cupertino_icons: ^1.0.8

  # Firebase for push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # File handling
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  html: ^0.15.6
  http: ^1.6.0
  cloud_firestore: ^5.6.12
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/metals/
